name: Build SimHub Plugin

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Download SimHub references
        shell: powershell
        run: |
          $refsDir = "lib\SimHubReferences"
          $tempDir = "C:\SimHub_temp"
          $dlls = @("SimHub.Plugins.dll", "GameReaderCommon.dll", "SimHub.Plugins.Common.dll")

          New-Item -ItemType Directory -Force -Path $refsDir | Out-Null

          # Fixed version — update manually when SimHub releases a new version
          $version = "9.11.11"
          $url = "https://github.com/SHWotever/SimHub/releases/download/$version/SimHubSetup_$version.exe"

          Write-Host "Downloading SimHub $version..."
          curl.exe -L -o SimHubSetup.exe $url --retry 3 --retry-delay 5 --fail

          if (-not (Test-Path SimHubSetup.exe)) {
            throw "Download failed"
          }

          $fileSize = [math]::Round((Get-Item SimHubSetup.exe).Length / 1MB, 1)
          Write-Host "Downloaded: $fileSize MB"

          # Run Inno Setup installer silently to a temp directory
          Write-Host "Installing SimHub silently to $tempDir ..."
          $proc = Start-Process -FilePath ".\SimHubSetup.exe" `
            -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/CLOSEAPPLICATIONS", "/DIR=$tempDir" `
            -Wait -NoNewWindow -PassThru

          Write-Host "Installer exit code: $($proc.ExitCode)"

          # Copy the required DLLs
          Write-Host "Searching for DLLs in $tempDir ..."
          foreach ($dll in $dlls) {
            $found = Get-ChildItem -Path $tempDir -Recurse -Filter $dll -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) {
              Copy-Item $found.FullName -Destination "$refsDir\$dll" -Force
              $size = [math]::Round($found.Length / 1KB, 1)
              Write-Host "  FOUND: $dll ($size KB) -> $($found.FullName)"
            } else {
              Write-Host "  MISSING: $dll"
            }
          }

          # Verify all required DLLs exist
          $missing = $dlls | Where-Object { -not (Test-Path "$refsDir\$_") }
          if ($missing.Count -gt 0) {
            Write-Host "`nAvailable DLLs in SimHub install:"
            Get-ChildItem -Path $tempDir -Filter "*.dll" -Recurse | ForEach-Object {
              Write-Host "  $($_.FullName) ($([math]::Round($_.Length / 1KB, 1)) KB)"
            }
            throw "Missing required DLLs: $($missing -join ', ')"
          }

          Write-Host "`nAll SimHub reference DLLs found!"

          # Cleanup
          Remove-Item SimHubSetup.exe -Force -ErrorAction SilentlyContinue
          # Don't remove $tempDir — the uninstaller may need it, and the runner is ephemeral anyway

      - name: Restore NuGet packages
        run: nuget restore PitLeaguePlugin/PitLeaguePlugin.csproj

      - name: Build Release
        run: msbuild PitLeaguePlugin/PitLeaguePlugin.csproj /p:Configuration=Release /p:Platform=AnyCPU /p:SIMHUB_PATH=..\lib\SimHubReferences
        shell: cmd

      - name: Verify DLL output
        shell: powershell
        run: |
          $dll = "PitLeaguePlugin\bin\Release\PitLeaguePlugin.dll"
          if (Test-Path $dll) {
            $size = (Get-Item $dll).Length / 1KB
            Write-Host "Build successful: $dll ($([math]::Round($size, 1)) KB)"
          } else {
            Write-Error "Build output not found: $dll"
            Get-ChildItem PitLeaguePlugin\bin -Recurse -ErrorAction SilentlyContinue | Format-Table FullName, Length
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PitLeaguePlugin
          path: PitLeaguePlugin/bin/Release/PitLeaguePlugin.dll

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: PitLeaguePlugin/bin/Release/PitLeaguePlugin.dll
          generate_release_notes: true
          body: |
            ## PitLeague SimHub Plugin

            ### Como instalar
            1. Baixe `PitLeaguePlugin.dll` abaixo
            2. Copie para `C:\Program Files (x86)\SimHub\PluginManager\plugins\`
            3. Reinicie o SimHub
            4. Vá em Settings → Plugins → ative "PitLeague Telemetry"
            5. Configure API Key e League ID nas configurações do plugin

            ### Compatibilidade
            - SimHub 9.x ou superior
            - .NET Framework 4.8
            - F1 25, ACC, iRacing e 200+ jogos suportados pelo SimHub
