name: Build SimHub Plugin

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore PitLeaguePlugin/PitLeaguePlugin.csproj

      - name: Version guard (tag = csproj = const)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CSPROJ_VERSION=$(sed -n 's/.*<Version>\(.*\)<\/Version>.*/\1/p' PitLeaguePlugin/PitLeaguePlugin.csproj | tr -d '[:space:]')
          CONST_VERSION=$(sed -n 's/.*VERSION = "\(.*\)".*/\1/p' PitLeaguePlugin/PitLeaguePlugin.cs | tr -d '[:space:]')

          echo "Tag:    $TAG_VERSION"
          echo "csproj: $CSPROJ_VERSION"
          echo "const:  $CONST_VERSION"

          if [ "$TAG_VERSION" != "$CSPROJ_VERSION" ] || [ "$TAG_VERSION" != "$CONST_VERSION" ]; then
            echo ""
            echo "❌ ERRO: Versões divergentes!"
            echo "   Tag git:        $TAG_VERSION"
            echo "   .csproj Version: $CSPROJ_VERSION"
            echo "   const VERSION:   $CONST_VERSION"
            echo ""
            echo "Os três valores DEVEM ser iguais. Corrija antes de publicar."
            exit 1
          fi

          echo "✅ Versões OK: $TAG_VERSION"

      - name: Build Release
        run: msbuild PitLeaguePlugin/PitLeaguePlugin.csproj /p:Configuration=Release /p:Platform=AnyCPU /p:SIMHUB_PATH=..\lib\SimHubReferences
        shell: cmd

      - name: Verify DLL output
        shell: powershell
        run: |
          $dll = "PitLeaguePlugin\bin\Release\PitLeaguePlugin.dll"
          if (Test-Path $dll) {
            $size = (Get-Item $dll).Length / 1KB
            Write-Host "Build successful: $dll ($([math]::Round($size, 1)) KB)"
          } else {
            Write-Error "Build output not found: $dll"
            Get-ChildItem PitLeaguePlugin\bin -Recurse -ErrorAction SilentlyContinue | Format-Table FullName, Length
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PitLeaguePlugin
          path: PitLeaguePlugin/bin/Release/PitLeaguePlugin.dll

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: PitLeaguePlugin/bin/Release/PitLeaguePlugin.dll
          generate_release_notes: true
          body: |
            ## PitLeague SimHub Plugin

            ### Como instalar
            1. Baixe `PitLeaguePlugin.dll` abaixo
            2. Copie para `C:\Program Files (x86)\SimHub\`
            3. Reinicie o SimHub
            4. Vá em Settings → Plugins → ative "PitLeague Telemetry"
            5. Configure API Key e League ID nas configurações do plugin

            ### Compatibilidade
            - SimHub 9.x ou superior
            - .NET Framework 4.8
            - F1 25, ACC, iRacing e 200+ jogos suportados pelo SimHub
